<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>YESLY ADELAY · MARZO 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ===== RESET Y BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', 'Orbitron', sans-serif;
            background: #03050b;
            min-height: 100vh;
            color: #eef5ff;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* ===== FONDO CON IMAGEN YESLY ===== */
        .bg-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/welding30001994/yeslyface/main/yesly.png?raw=true');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== OVERLAY NEÓN + GRID ===== */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.05) 0px, rgba(0, 255, 255, 0.05) 1px, transparent 1px, transparent 45px),
                repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.05) 0px, rgba(0, 255, 255, 0.05) 1px, transparent 1px, transparent 45px);
            z-index: 1;
            pointer-events: none;
        }

        .glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.08), rgba(0, 0, 0, 0.80));
            z-index: 2;
            pointer-events: none;
        }

        /* ===== PARTICULAS ===== */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .container {
            position: relative;
            z-index: 15;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 30px 20px 15px;
            position: relative;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00ff88, #00ffff, #00ff88);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 4s ease-in-out infinite alternate;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
            filter: drop-shadow(0 0 30px rgba(0, 255, 136, 0.2));
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .header .subtitle {
            font-size: clamp(1rem, 4vw, 1.6rem);
            font-weight: 300;
            letter-spacing: 6px;
            color: #b0f0ff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-top: 5px;
        }

        .header p {
            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            opacity: 0.85;
            max-width: 600px;
            margin: 12px auto 0;
            color: #b3d9ff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        /* ===== BADGE MES ===== */
        .month-badge {
            display: inline-block;
            margin: 20px auto 15px;
            padding: 10px 40px;
            background: rgba(0, 255, 136, 0.06);
            border: 2px solid rgba(0, 255, 136, 0.4);
            border-radius: 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 4px;
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.15), inset 0 0 20px rgba(0, 255, 136, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        .month-badge:hover {
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.3);
            border-color: #00ffff;
            transform: scale(1.02);
        }

        /* ===== BUSCADOR ===== */
        .search-container {
            max-width: 600px;
            margin: 10px auto 25px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 16px 30px;
            background: rgba(12, 15, 30, 0.75);
            border: 2px solid rgba(0, 255, 136, 0.25);
            border-radius: 60px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            font-family: 'Exo 2', sans-serif;
        }

        .search-box:focus {
            border-color: #00ff88;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.2), inset 0 0 20px rgba(0, 255, 136, 0.05);
        }

        .search-box::placeholder {
            color: #8899bb;
            letter-spacing: 1px;
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: #00ff88;
            font-size: 1.2rem;
            opacity: 0.7;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        /* ===== GRID DE DÍAS ===== */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
            padding: 20px 10px 30px;
        }

        @media (min-width: 640px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 28px;
            }
        }

        @media (min-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(6, 1fr);
                gap: 30px;
            }
        }

        /* ===== TARJETA DÍA (folder) con efecto neón ===== */
        .folder {
            position: relative;
            background: rgba(12, 18, 35, 0.70);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 28px 16px 22px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1.5px solid rgba(0, 255, 136, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* Borde neón animado */
        .folder::before {
            content: '';
            position: absolute;
            inset: -2px;
            z-index: -1;
            border-radius: 30px;
            background: linear-gradient(45deg, #00ff88, #00ffff, #00ff88, #00ffff);
            background-size: 300% 300%;
            opacity: 0;
            transition: opacity 0.6s ease;
            animation: neonBorder 3s ease-in-out infinite;
        }

        .folder:hover::before {
            opacity: 1;
        }

        @keyframes neonBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .folder:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: #00ffff;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.4), 0 0 80px rgba(0, 255, 136, 0.15);
            background: rgba(20, 28, 55, 0.85);
        }

        .folder:active {
            transform: scale(0.96);
        }

        /* Efecto de brillo deslizante */
        .folder::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.06), transparent);
            transition: left 0.6s ease;
            pointer-events: none;
        }

        .folder:hover::after {
            left: 100%;
        }

        /* Icono del día */
        .folder-icon {
            font-size: clamp(2.8rem, 8vw, 4rem);
            margin-bottom: 10px;
            transition: all 0.4s ease;
            display: block;
        }

        .folder:hover .folder-icon {
            transform: scale(1.2) rotate(8deg);
            filter: drop-shadow(0 0 20px currentColor);
        }

        /* Nombre del día */
        .folder-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.95rem, 3vw, 1.2rem);
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Badge del número de día */
        .folder-day {
            font-size: 0.8rem;
            color: #aac;
            opacity: 0.85;
            background: rgba(0, 255, 136, 0.08);
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 6px;
            border: 1px solid rgba(0, 255, 136, 0.15);
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .folder:hover .folder-day {
            border-color: #00ffff;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
            background: rgba(0, 255, 255, 0.08);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(12, 18, 40, 0.95);
            border-radius: 32px;
            padding: 40px 35px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(0, 255, 136, 0.3);
            transform: scale(0.9) translateY(30px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #00ff88, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
        }

        .modal-header p {
            color: #aac0ee;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 28px;
        }

        .action-btn {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .foto1-btn {
            background: linear-gradient(135deg, #ff44e6, #ff8800);
            color: #fff;
        }

        .foto2-btn {
            background: linear-gradient(135deg, #00ccff, #0066ff);
            color: #fff;
        }

        .action-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .foto1-btn:hover {
            box-shadow: 0 0 40px rgba(255, 68, 230, 0.5);
        }
        .foto2-btn:hover {
            box-shadow: 0 0 40px rgba(0, 204, 255, 0.5);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #88aadd;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            margin-top: 30px;
            border-top: 2px solid rgba(0, 255, 136, 0.15);
            color: #99b0dd;
            letter-spacing: 2px;
            font-size: 0.85rem;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.1);
        }

        .footer .highlight {
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            .header .subtitle {
                font-size: 1rem;
                letter-spacing: 3px;
            }
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 16px;
                padding: 10px 5px;
            }
            .folder {
                padding: 20px 12px 16px;
                border-radius: 22px;
            }
            .folder-icon {
                font-size: 2.5rem;
            }
            .month-badge {
                font-size: 1.3rem;
                padding: 8px 24px;
            }
            .search-box {
                padding: 14px 24px;
                font-size: 0.9rem;
            }
            .action-buttons {
                flex-direction: column;
                gap: 12px;
            }
            .modal-content {
                padding: 28px 20px;
            }
            .modal-header h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            .header h1 {
                font-size: 2rem;
            }
            .month-badge {
                font-size: 1.1rem;
                padding: 6px 18px;
            }
            .folder {
                padding: 16px 8px 14px;
                border-radius: 18px;
            }
            .folder-icon {
                font-size: 2rem;
            }
            .folder-name {
                font-size: 0.8rem;
            }
            .folder-day {
                font-size: 0.7rem;
                padding: 2px 12px;
            }
            .modal-header h2 {
                font-size: 1.4rem;
            }
            .action-btn {
                font-size: 0.9rem;
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== CAPAS DE FONDO ===== -->
    <div class="bg-image-layer"></div>
    <div class="cyber-grid"></div>
    <div class="glow-overlay"></div>
    <div id="particles-js"></div>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <div class="container">
        <header class="header">
            <h1>YESLY ADELAY</h1>
            <div class="subtitle">⚡ TRADING CUÁNTICO ⚡</div>
            <p>Accede a nuestros documentos de análisis y estrategias de vanguardia</p>
            <div class="month-badge">🌿 MARZO 2026</div>
        </header>

        <!-- BUSCADOR -->
        <div class="search-container">
            <input type="text" class="search-box" id="searchInput" placeholder="Buscar día..." />
            <i class="fas fa-search search-icon"></i>
        </div>

        <!-- GRID DE DÍAS -->
        <div class="grid-container" id="folders-container">
            <!-- Generado por JavaScript -->
        </div>

        <footer class="footer">
            <p>© 2026 · <span class="highlight">Yesly Adelay Trading</span> · Sistema Cuántico de Documentos · Alta Frecuencia</p>
        </footer>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="action-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-header">
                <h2 id="modal-title">Día 1</h2>
                <p>Selecciona una opción para este documento</p>
            </div>
            <div class="action-buttons">
                <button class="action-btn foto1-btn" id="foto1-btn">📸 FOTOS 1</button>
                <button class="action-btn foto2-btn" id="foto2-btn">📷 FOTO 2</button>
            </div>
        </div>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js">
    </script>
    <script>
        (function() {
            'use strict';

            // ===== PARTICULAS (estilo futurista) =====
            particlesJS('particles-js', {
                particles: {
                    number: { value: 70, density: { enable: true, value_area: 800 } },
                    color: { value: "#00ff88" },
                    shape: { type: "circle" },
                    opacity: { value: 0.4, random: true },
                    size: { value: 2.5, random: true },
                    line_linked: { enable: true, distance: 140, color: "#00ff88", opacity: 0.2, width: 1 },
                    move: { enable: true, speed: 0.9, direction: "none", random: true, out_mode: "out" }
                },
                interactivity: {
                    events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" } }
                },
                retina_detect: true
            });

            // ===== ICONOS Y COLORES PARA CADA DÍA (MARZO) =====
            const iconos = [
                'fa-leaf', 'fa-tree', 'fa-seedling', 'fa-sun', 'fa-cloud-sun',
                'fa-cloud-rain', 'fa-cloud-bolt', 'fa-wind', 'fa-water', 'fa-droplet',
                'fa-spa', 'fa-flower', 'fa-pagelines', 'fa-cannabis', 'fa-tree',
                'fa-leaf', 'fa-cloud', 'fa-smile', 'fa-gem', 'fa-star',
                'fa-sparkles', 'fa-wand-magic-sparkles', 'fa-crystal-ball', 'fa-moon', 'fa-star-shooting',
                'fa-rocket', 'fa-bolt', 'fa-fire', 'fa-snowflake', 'fa-umbrella',
                'fa-cloud'
            ];

            const colores = [
                '#00ff88', '#00ffcc', '#66ff33', '#ffcc00', '#ff9900',
                '#00ccff', '#33ccff', '#66ff99', '#33ff66', '#00ffaa',
                '#66ffcc', '#99ff33', '#ccff33', '#88ff44', '#44ff88',
                '#00ff66', '#00ff99', '#33ffcc', '#66ff66', '#88ff99',
                '#aaff44', '#66ff44', '#44ff66', '#22ff88', '#11ffaa',
                '#00ffbb', '#00ffdd', '#44ffcc', '#88ffaa', '#bbff66',
                '#ddff44'
            ];

            // ===== GENERAR DÍAS (MARZO 2026: 31 días) =====
            const container = document.getElementById('folders-container');
            const totalDias = 31;

            for (let d = 1; d <= totalDias; d++) {
                const folder = document.createElement('div');
                folder.classList.add('folder');
                folder.dataset.day = d;

                const icon = iconos[(d - 1) % iconos.length];
                const color = colores[(d * 3) % colores.length];

                folder.innerHTML = `
                    <i class="fas ${icon} folder-icon" style="color: ${color}; text-shadow: 0 0 20px ${color}40;"></i>
                    <div class="folder-name">MARZO ${d}</div>
                    <div class="folder-day">Día ${d}</div>
                `;

                folder.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const day = parseInt(this.dataset.day);
                    openActionModal(day);
                });

                container.appendChild(folder);
            }

            // ===== MODAL =====
            const modal = document.getElementById('action-modal');
            const modalTitle = document.getElementById('modal-title');

            function openActionModal(day) {
                modalTitle.textContent = `MARZO · Día ${day}`;
                modal.classList.add('active');

                // Eliminar event listeners antiguos clonando botones
                const foto1Btn = document.getElementById('foto1-btn');
                const foto2Btn = document.getElementById('foto2-btn');

                const newFoto1 = foto1Btn.cloneNode(true);
                const newFoto2 = foto2Btn.cloneNode(true);
                foto1Btn.parentNode.replaceChild(newFoto1, foto1Btn);
                foto2Btn.parentNode.replaceChild(newFoto2, foto2Btn);

                document.getElementById('foto1-btn').addEventListener('click', function() {
                    window.location.href = `fotos1/index${day}.html`;
                });

                document.getElementById('foto2-btn').addEventListener('click', function() {
                    window.location.href = `fotos2/index${day}.html`;
                });
            }

            function closeModal() {
                modal.classList.remove('active');
            }

            // ===== EVENTOS DEL MODAL =====
            document.getElementById('close-modal').addEventListener('click', closeModal);
            modal.addEventListener('click', function(e) {
                if (e.target === modal) closeModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeModal();
            });

            // ===== BÚSQUEDA EN TIEMPO REAL =====
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                const term = this.value.toLowerCase().trim();
                const folders = document.querySelectorAll('.folder');

                folders.forEach(folder => {
                    const nombre = folder.querySelector('.folder-name')?.textContent?.toLowerCase() || '';
                    const dia = folder.querySelector('.folder-day')?.textContent?.toLowerCase() || '';
                    const coincide = nombre.includes(term) || dia.includes(term);
                    folder.style.display = coincide ? 'block' : 'none';
                });
            });

        })();
    </script>
</body>
</html>
