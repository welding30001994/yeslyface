<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>YESLY ADELAY · CALENDARIO CUÁNTICO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* ===== RESET Y BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', 'Orbitron', sans-serif;
            background: #03050b;
            min-height: 100vh;
            color: #eef5ff;
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* ===== FONDO CON IMAGEN YESLY ===== */
        .bg-image-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/welding30001994/yeslyface/main/yesly.png?raw=true');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0.35;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== OVERLAY NEÓN + GRID ===== */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.05) 0px, rgba(0, 255, 255, 0.05) 1px, transparent 1px, transparent 45px),
                repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.05) 0px, rgba(0, 255, 255, 0.05) 1px, transparent 1px, transparent 45px);
            z-index: 1;
            pointer-events: none;
        }

        .glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.08), rgba(0, 0, 0, 0.80));
            z-index: 2;
            pointer-events: none;
        }

        /* ===== PARTICULAS ===== */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .container {
            position: relative;
            z-index: 15;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 30px 20px 15px;
            position: relative;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, #00ffff, #ff44e6, #00ffff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 4s ease-in-out infinite alternate;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.2));
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .header .subtitle {
            font-size: clamp(1rem, 4vw, 1.6rem);
            font-weight: 300;
            letter-spacing: 6px;
            color: #b0f0ff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-top: 5px;
        }

        .header p {
            font-size: clamp(0.9rem, 2.5vw, 1.15rem);
            opacity: 0.85;
            max-width: 600px;
            margin: 12px auto 0;
            color: #b3d9ff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        /* ===== BADGE MES ===== */
        .month-badge {
            display: inline-block;
            margin: 20px auto 15px;
            padding: 10px 40px;
            background: rgba(0, 255, 255, 0.06);
            border: 2px solid rgba(0, 255, 255, 0.4);
            border-radius: 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 4px;
            color: #00ffff;
            text-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.15), inset 0 0 20px rgba(0, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        .month-badge:hover {
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.3);
            border-color: #ff44e6;
            transform: scale(1.02);
        }

        /* ===== BUSCADOR ===== */
        .search-container {
            max-width: 600px;
            margin: 10px auto 25px;
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 16px 30px;
            background: rgba(12, 15, 30, 0.75);
            border: 2px solid rgba(0, 255, 255, 0.25);
            border-radius: 60px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            font-family: 'Exo 2', sans-serif;
        }

        .search-box:focus {
            border-color: #00ffff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.05);
        }

        .search-box::placeholder {
            color: #8899bb;
            letter-spacing: 1px;
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            color: #00ffff;
            font-size: 1.2rem;
            opacity: 0.7;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        /* ===== GRID DE MESES (estilo galería mejorada) ===== */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 25px;
            padding: 20px 10px 30px;
        }

        @media (min-width: 640px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 28px;
            }
        }

        @media (min-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(6, 1fr);
                gap: 30px;
            }
        }

        /* ===== TARJETA MES (folder) con efecto neón ===== */
        .folder {
            position: relative;
            background: rgba(12, 18, 35, 0.70);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 28px 16px 22px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1.5px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        /* Borde neón animado */
        .folder::before {
            content: '';
            position: absolute;
            inset: -2px;
            z-index: -1;
            border-radius: 30px;
            background: linear-gradient(45deg, cyan, #ff44e6, cyan, #ff44e6);
            background-size: 300% 300%;
            opacity: 0;
            transition: opacity 0.6s ease;
            animation: neonBorder 3s ease-in-out infinite;
        }

        .folder:hover::before {
            opacity: 1;
        }

        @keyframes neonBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .folder:hover {
            transform: translateY(-10px) scale(1.03);
            border-color: #ff44e6;
            box-shadow: 0 0 50px rgba(255, 68, 230, 0.4), 0 0 80px rgba(0, 255, 255, 0.15);
            background: rgba(20, 28, 55, 0.85);
        }

        .folder:active {
            transform: scale(0.96);
        }

        /* Efecto de brillo deslizante */
        .folder::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.06), transparent);
            transition: left 0.6s ease;
            pointer-events: none;
        }

        .folder:hover::after {
            left: 100%;
        }

        /* Icono del mes */
        .folder-icon {
            font-size: clamp(2.8rem, 8vw, 4rem);
            margin-bottom: 10px;
            color: #00ffff;
            text-shadow: 0 0 25px rgba(0, 255, 255, 0.6);
            transition: all 0.4s ease;
            display: block;
        }

        .folder:hover .folder-icon {
            transform: scale(1.2) rotate(8deg);
            color: #ff44e6;
            text-shadow: 0 0 40px #ff44e6, 0 0 80px rgba(255, 68, 230, 0.3);
        }

        /* Nombre del mes */
        .folder-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(0.95rem, 3vw, 1.2rem);
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: 1px;
            text-transform: capitalize;
            background: linear-gradient(135deg, #fff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Badge del número de mes */
        .folder-day {
            font-size: 0.8rem;
            color: #aac;
            opacity: 0.85;
            background: rgba(0, 255, 255, 0.08);
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 6px;
            border: 1px solid rgba(0, 255, 255, 0.15);
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .folder:hover .folder-day {
            border-color: #ff44e6;
            color: #ff44e6;
            text-shadow: 0 0 10px rgba(255, 68, 230, 0.3);
            background: rgba(255, 68, 230, 0.08);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 30px 20px;
            margin-top: 30px;
            border-top: 2px solid rgba(0, 255, 255, 0.15);
            color: #99b0dd;
            letter-spacing: 2px;
            font-size: 0.85rem;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
        }

        .footer .highlight {
            color: #00ffff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            .header .subtitle {
                font-size: 1rem;
                letter-spacing: 3px;
            }
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 16px;
                padding: 10px 5px;
            }
            .folder {
                padding: 20px 12px 16px;
                border-radius: 22px;
            }
            .folder-icon {
                font-size: 2.5rem;
            }
            .month-badge {
                font-size: 1.3rem;
                padding: 8px 24px;
            }
            .search-box {
                padding: 14px 24px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            .header h1 {
                font-size: 2rem;
            }
            .month-badge {
                font-size: 1.1rem;
                padding: 6px 18px;
            }
            .folder {
                padding: 16px 8px 14px;
                border-radius: 18px;
            }
            .folder-icon {
                font-size: 2rem;
            }
            .folder-name {
                font-size: 0.8rem;
            }
            .folder-day {
                font-size: 0.7rem;
                padding: 2px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- ===== CAPAS DE FONDO ===== -->
    <div class="bg-image-layer"></div>
    <div class="cyber-grid"></div>
    <div class="glow-overlay"></div>
    <div id="particles-js"></div>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <div class="container">
        <header class="header">
            <h1>YESLY ADELAY</h1>
            <div class="subtitle">⚡ CALENDARIO CUÁNTICO ⚡</div>
            <p>Accede a los documentos mensuales de análisis y estrategias</p>
            <div class="month-badge">📅 2026 · TODOS LOS MESES</div>
        </header>

        <!-- BUSCADOR -->
        <div class="search-container">
            <input type="text" class="search-box" id="searchInput" placeholder="Buscar mes..." />
            <i class="fas fa-search search-icon"></i>
        </div>

        <!-- GRID DE MESES -->
        <div class="grid-container" id="months-container">
            <!-- Generado por JavaScript -->
        </div>

        <footer class="footer">
            <p>© 2026 · <span class="highlight">Yesly Adelay Trading</span> · Sistema Cuántico de Documentos · Alta Frecuencia</p>
        </footer>
    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js">
    </script>
    <script>
        (function() {
            'use strict';

            // ===== PARTÍCULAS (estilo futurista) =====
            particlesJS('particles-js', {
                particles: {
                    number: { value: 70, density: { enable: true, value_area: 800 } },
                    color: { value: "#00ffff" },
                    shape: { type: "circle" },
                    opacity: { value: 0.4, random: true },
                    size: { value: 2.5, random: true },
                    line_linked: { enable: true, distance: 140, color: "#00ffff", opacity: 0.2, width: 1 },
                    move: { enable: true, speed: 0.9, direction: "none", random: true, out_mode: "out" }
                },
                interactivity: {
                    events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" } }
                },
                retina_detect: true
            });

            // ===== DATOS DE MESES =====
            const meses = [
                { nombre: 'enero', icono: 'fa-snowflake', numero: 1 },
                { nombre: 'febrero', icono: 'fa-heart', numero: 2 },
                { nombre: 'marzo', icono: 'fa-leaf', numero: 3 },
                { nombre: 'abril', icono: 'fa-cloud-rain', numero: 4 },
                { nombre: 'mayo', icono: 'fa-sun', numero: 5 },
                { nombre: 'junio', icono: 'fa-umbrella', numero: 6 },
                { nombre: 'julio', icono: 'fa-fire', numero: 7 },
                { nombre: 'agosto', icono: 'fa-tree', numero: 8 },
                { nombre: 'septiembre', icono: 'fa-leaf', numero: 9 },
                { nombre: 'octubre', icono: 'fa-moon', numero: 10 },
                { nombre: 'noviembre', icono: 'fa-wind', numero: 11 },
                { nombre: 'diciembre', icono: 'fa-snowflake', numero: 12 }
            ];

            // ===== GENERAR TARJETAS =====
            const container = document.getElementById('months-container');

            meses.forEach((mes) => {
                const folder = document.createElement('div');
                folder.classList.add('folder');
                folder.dataset.mes = mes.nombre;

                const nombreCapitalizado = mes.nombre.charAt(0).toUpperCase() + mes.nombre.slice(1);

                folder.innerHTML = `
                    <i class="fas ${mes.icono} folder-icon"></i>
                    <div class="folder-name">${nombreCapitalizado}</div>
                    <div class="folder-day">Mes ${mes.numero}</div>
                `;

                // Redirigir a mes/mes/mes.html
                folder.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const mesActual = this.dataset.mes;
                    window.location.href = `mes/${mesActual}/${mesActual}.html`;
                });

                container.appendChild(folder);
            });

            // ===== BÚSQUEDA EN TIEMPO REAL =====
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                const term = this.value.toLowerCase().trim();
                const folders = document.querySelectorAll('.folder');

                folders.forEach(folder => {
                    const nombre = folder.querySelector('.folder-name')?.textContent?.toLowerCase() || '';
                    const dia = folder.querySelector('.folder-day')?.textContent?.toLowerCase() || '';
                    const coincide = nombre.includes(term) || dia.includes(term);
                    folder.style.display = coincide ? 'block' : 'none';
                });
            });

        })();
    </script>
</body>
</html>
