<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yesly Adelay · Futurista</title>
  
  <!-- Fuentes y librerías -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      set, 
      get, 
      child,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB1Cs2os3tTfrMbYSAmDeJAGnP4tTtsFdw",
      authDomain: "beaver-trading.firebaseapp.com",
      databaseURL: "https://beaver-trading-default-rtdb.firebaseio.com",
      projectId: "beaver-trading",
      storageBucket: "beaver-trading.firebasestorage.app",
      messagingSenderId: "926610131904",
      appId: "1:926610131904:web:c147bd337bd12b4d085625",
      measurementId: "G-1K51WWF2ZJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // Verificar sesión activa
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const dbRef = ref(database);
          const snapshot = await get(child(dbRef, `users/${user.uid}`));
          if (snapshot.exists()) {
            window.location.href = "home.html";
          } else {
            await auth.signOut();
            alert('⚠️ Usuario no registrado en la base de datos.');
          }
        } catch (error) {
          console.error('Error:', error);
        }
      }
    });

    // Elementos DOM
    const loginForm = document.getElementById('loginFormElement');
    const registerForm = document.getElementById('registerFormElement');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginContainer = document.getElementById('loginForm');
    const registerContainer = document.getElementById('registerForm');

    function setActiveTab(tab) {
      tabLogin.classList.remove('active');
      tabRegister.classList.remove('active');
      tab.classList.add('active');
      if (tab === tabLogin) {
        loginContainer.classList.remove('hidden');
        registerContainer.classList.add('hidden');
      } else {
        registerContainer.classList.remove('hidden');
        loginContainer.classList.add('hidden');
      }
    }

    tabLogin.addEventListener('click', () => setActiveTab(tabLogin));
    tabRegister.addEventListener('click', () => setActiveTab(tabRegister));

    // Registro
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = registerForm.querySelector('input[type="text"]').value.trim();
      const email = registerForm.querySelector('input[type="email"]').value.trim();
      const password = registerForm.querySelector('input[type="password"]').value;

      if (!name || !email || !password) {
        alert('⚠️ Completa todos los campos.');
        return;
      }
      if (password.length < 6) {
        alert('⚠️ La contraseña debe tener al menos 6 caracteres.');
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        await set(ref(database, `users/${user.uid}`), {
          uid: user.uid,
          name: name,
          email: user.email,
          createdAt: new Date().toISOString(),
          lastLogin: new Date().toISOString(),
          active: true
        });
        alert('✅ ¡Registro exitoso!');
        window.location.href = "home.html";
      } catch (error) {
        let mensaje = '❌ Error al registrar. ';
        if (error.code === 'auth/email-already-in-use') mensaje += 'Correo ya registrado.';
        else if (error.code === 'auth/invalid-email') mensaje += 'Correo inválido.';
        else if (error.code === 'auth/weak-password') mensaje += 'Contraseña débil.';
        else mensaje += error.message;
        alert(mensaje);
      }
    });

    // Inicio de sesión
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = loginForm.querySelector('input[type="email"]').value.trim();
      const password = loginForm.querySelector('input[type="password"]').value;

      if (!email || !password) {
        alert('⚠️ Completa todos los campos.');
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const dbRef = ref(database);
        const snapshot = await get(child(dbRef, `users/${user.uid}`));
        
        if (snapshot.exists()) {
          await update(ref(database, `users/${user.uid}`), {
            lastLogin: new Date().toISOString()
          });
          alert('✅ ¡Bienvenido!');
          window.location.href = "home.html";
        } else {
          await auth.signOut();
          alert('❌ Usuario no encontrado en la base de datos.');
        }
      } catch (error) {
        let mensaje = '❌ Error al iniciar sesión. ';
        if (error.code === 'auth/user-not-found') mensaje += 'Usuario no encontrado.';
        else if (error.code === 'auth/wrong-password') mensaje += 'Contraseña incorrecta.';
        else if (error.code === 'auth/invalid-email') mensaje += 'Correo inválido.';
        else mensaje += error.message;
        alert(mensaje);
      }
    });

    window.cambiarATab = (tab) => {
      if (tab === 'login') setActiveTab(tabLogin);
      else setActiveTab(tabRegister);
    };
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      color: #f0f4ff;
      background-image: url('https://raw.githubusercontent.com/welding30001994/yeslyface/refs/heads/main/yesly.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .glass-card {

      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.15);
      padding: 0.4rem;
      border-radius: 60px;
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(5px);
    }

    .tab-btn {

      padding: 0.7rem 0.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;

      font-family: 'Inter', sans-serif;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .tab-btn.active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      box-shadow: 0 0 30px rgba(0, 119, 255, 0.15);
      backdrop-filter: blur(10px);
    }

    .tab-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.05);
    }

    .form-group {
      margin-bottom: 1.6rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.15);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.1rem 1.2rem;
      transition: all 0.4s ease;
      backdrop-filter: blur(5px);
    }

    /* EFECTO: borde fino + oscurecimiento suave al enfocar */
    .input-wrapper:focus-within {
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.35);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
      transform: scale(1.01);
    }

    .input-wrapper i {
      color: rgba(255, 255, 255, 0.4);
      font-size: 1rem;
      margin-right: 0.8rem;
      opacity: 0.6;
      transition: 0.3s;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .input-wrapper:focus-within i {
      opacity: 1;
      color: rgba(255, 255, 255, 0.8);
    }

    .input-wrapper input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 0.9rem 0;
      font-size: 1rem;
      color: white;
      outline: none;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .input-wrapper input:focus::placeholder {
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .input-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.35);
      font-weight: 300;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    /* AUTOCOMPLETADO - ocultar valores de demo */
    .input-wrapper input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.3) inset !important;
      -webkit-text-fill-color: white !important;
    }

    .btn-primary {
      width: 100%;
      padding: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 60px;
      background: rgba(59, 139, 255, 0.6);
      backdrop-filter: blur(10px);
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 30px rgba(0, 68, 255, 0.15);
      margin-top: 0.4rem;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary:hover {
      transform: scale(1.02);
      background: rgba(90, 156, 255, 0.7);
      box-shadow: 0 12px 40px rgba(0, 102, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .form-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .form-footer a {
      color: rgba(140, 186, 255, 0.8);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dashed rgba(74, 122, 192, 0.3);
      cursor: pointer;
      transition: 0.3s;
    }

    .form-footer a:hover {
      color: white;
      border-bottom-color: rgba(255, 255, 255, 0.3);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0 1.5rem;
      color: rgba(255, 255, 255, 0.2);
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 1px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
    }

    .social-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.2rem;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .social-link:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      color: white;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .form-container {
      display: block;
      transition: opacity 0.25s;
    }

    .form-container.hidden {
      display: none;
    }

    .demo-note {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 1.8rem;
      opacity: 0.25;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.4);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 450px) {
      .glass-card {
        padding: 1.8rem 1.2rem;
        border-radius: 2.2rem;
      }
      .brand h1 {
        font-size: 2rem;
      }
      .social-link {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <!-- Brand -->
    <div class="brand">
      <h1>
        <i class="fas fa-chart-line"></i>
        Yesly Adelay
      </h1>
      <div class="sub">trading · futuro</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin">Iniciar sesión</button>
      <button class="tab-btn" id="tabRegister">Registrarse</button>
    </div>

    <!-- Login -->
    <div id="loginForm" class="form-container">
