<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yesly Adelay · Futurista</title>
  
  <!-- Fuentes y librerías -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

  <!-- Firebase SDKs (versión modular) -->
  <script type="module">
    // Importar Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      set, 
      get, 
      child,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

    // Configuración de Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyB1Cs2os3tTfrMbYSAmDeJAGnP4tTtsFdw",
      authDomain: "beaver-trading.firebaseapp.com",
      databaseURL: "https://beaver-trading-default-rtdb.firebaseio.com",
      projectId: "beaver-trading",
      storageBucket: "beaver-trading.firebasestorage.app",
      messagingSenderId: "926610131904",
      appId: "1:926610131904:web:c147bd337bd12b4d085625",
      measurementId: "G-1K51WWF2ZJ"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    console.log('🔥 Firebase inicializado correctamente');

    // --- VERIFICAR SESIÓN ACTIVA ---
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          // Verificar que el usuario existe en la base de datos
          const dbRef = ref(database);
          const snapshot = await get(child(dbRef, `users/${user.uid}`));
          
          if (snapshot.exists()) {
            console.log('✅ Usuario verificado en DB:', snapshot.val());
            // Redirigir a home.html
            window.location.href = "home.html";
          } else {
            console.warn('⚠️ Usuario autenticado pero NO existe en DB');
            // Si no existe en DB, cerrar sesión
            await auth.signOut();
            alert('Tu cuenta no está registrada en la base de datos. Contacta con soporte.');
          }
        } catch (error) {
          console.error('Error verificando usuario en DB:', error);
        }
      }
    });

    // --- ELEMENTOS DEL DOM ---
    const loginForm = document.getElementById('loginFormElement');
    const registerForm = document.getElementById('registerFormElement');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginContainer = document.getElementById('loginForm');
    const registerContainer = document.getElementById('registerForm');

    // --- FUNCIÓN PARA CAMBIAR DE PESTAÑA ---
    function setActiveTab(tab) {
      tabLogin.classList.remove('active');
      tabRegister.classList.remove('active');
      tab.classList.add('active');

      if (tab === tabLogin) {
        loginContainer.classList.remove('hidden');
        registerContainer.classList.add('hidden');
      } else {
        registerContainer.classList.remove('hidden');
        loginContainer.classList.add('hidden');
      }
    }

    tabLogin.addEventListener('click', () => setActiveTab(tabLogin));
    tabRegister.addEventListener('click', () => setActiveTab(tabRegister));

    // --- REGISTRO DE USUARIO ---
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = registerForm.querySelector('input[type="text"]').value.trim();
      const email = registerForm.querySelector('input[type="email"]').value.trim();
      const password = registerForm.querySelector('input[type="password"]').value;

      // Validaciones
      if (!name || !email || !password) {
        alert('⚠️ Por favor, completa todos los campos.');
        return;
      }

      if (password.length < 6) {
        alert('⚠️ La contraseña debe tener al menos 6 caracteres.');
        return;
      }

      try {
        // 1. Crear usuario en Firebase Authentication
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Guardar información adicional en Realtime Database
        const userRef = ref(database, `users/${user.uid}`);
        await set(userRef, {
          uid: user.uid,
          name: name,
          email: user.email,
          createdAt: new Date().toISOString(),
          lastLogin: new Date().toISOString(),
          active: true
        });

        console.log('✅ Usuario registrado y guardado en DB:', {
          uid: user.uid,
          name: name,
          email: user.email
        });

        alert('✅ ¡Registro exitoso! Redirigiendo...');
        // Redirigir a home.html
        window.location.href = "home.html";

      } catch (error) {
        console.error('❌ Error en registro:', error);
        let mensaje = '❌ Error al registrar. ';
        
        if (error.code === 'auth/email-already-in-use') {
          mensaje += 'Este correo ya está registrado.';
        } else if (error.code === 'auth/invalid-email') {
          mensaje += 'Correo electrónico inválido.';
        } else if (error.code === 'auth/weak-password') {
          mensaje += 'La contraseña es muy débil.';
        } else {
          mensaje += error.message;
        }
        alert(mensaje);
      }
    });

    // --- INICIO DE SESIÓN ---
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = loginForm.querySelector('input[type="email"]').value.trim();
      const password = loginForm.querySelector('input[type="password"]').value;

      if (!email || !password) {
        alert('⚠️ Por favor, completa todos los campos.');
        return;
      }

      try {
        // 1. Autenticar usuario con Firebase Auth
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // 2. Verificar que el usuario existe en Realtime Database
        const dbRef = ref(database);
        const snapshot = await get(child(dbRef, `users/${user.uid}`));

        if (snapshot.exists()) {
          const userData = snapshot.val();
          console.log('✅ Usuario verificado en DB:', userData);
          
          // Actualizar último login
          await update(ref(database, `users/${user.uid}`), {
            lastLogin: new Date().toISOString()
          });

          alert('✅ ¡Inicio de sesión exitoso!');
          // Redirigir a home.html
          window.location.href = "home.html";
        } else {
          // El usuario existe en Auth pero no en DB - cerrar sesión
          await auth.signOut();
          alert('❌ Usuario no encontrado en la base de datos. Contacta con soporte.');
        }

      } catch (error) {
        console.error('❌ Error en login:', error);
        let mensaje = '❌ Error al iniciar sesión. ';
        
        if (error.code === 'auth/user-not-found') {
          mensaje += 'Usuario no encontrado.';
        } else if (error.code === 'auth/wrong-password') {
          mensaje += 'Contraseña incorrecta.';
        } else if (error.code === 'auth/invalid-email') {
          mensaje += 'Correo electrónico inválido.';
        } else if (error.code === 'auth/too-many-requests') {
          mensaje += 'Demasiados intentos. Intenta más tarde.';
        } else {
          mensaje += error.message;
        }
        alert(mensaje);
      }
    });

    // Exponer funciones para los enlaces
    window.cambiarATab = (tab) => {
      if (tab === 'login') {
        setActiveTab(tabLogin);
      } else if (tab === 'register') {
        setActiveTab(tabRegister);
      }
    };

    console.log('✅ Firebase Auth + Database inicializados');
  </script>

  <style>

    .input-wrapper input::placeholder {

    }

    .btn-primary {

    }

    .btn-primary:hover {

      box-shadow: 0 12px 35px #0066ff60;
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .form-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.9rem;

    }

    .form-footer a {

    }

    .form-footer a:hover {

      border-bottom-color: white;
    }

    .divider {
      display: flex;

    .divider::before,
    .divider::after {

    .social-links {
      display: flex;

    }

    .social-link {
      display: inline-flex;

      justify-content: center;
      width: 44px;

    .social-link:hover {

      transform: translateY(-4px) scale(1.05);

    }

    .social-link i {
      filter: drop-shadow(0 0 4px #0080ff20);
    }

    .form-container {
      display: block;
      transition: opacity 0.25s;
    }

    .form-container.hidden {
      display: none;
    }

    .demo-note {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 1.8rem;

    }

    @media (max-width: 450px) {
      .glass-card {
        padding: 1.8rem 1.2rem;
        border-radius: 2.2rem;
      }
      .brand h1 {
        font-size: 2rem;
      }
      .social-link {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
