<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>YESLY ADELAY · Login Futurista</title>
  
  <!-- Fuentes y librerías -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
    import { 
      getDatabase, 
      ref, 
      set, 
      get, 
      child,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB1Cs2os3tTfrMbYSAmDeJAGnP4tTtsFdw",
      authDomain: "beaver-trading.firebaseapp.com",
      databaseURL: "https://beaver-trading-default-rtdb.firebaseio.com",
      projectId: "beaver-trading",
      storageBucket: "beaver-trading.firebasestorage.app",
      messagingSenderId: "926610131904",
      appId: "1:926610131904:web:c147bd337bd12b4d085625",
      measurementId: "G-1K51WWF2ZJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // Verificar sesión activa
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        try {
          const dbRef = ref(database);
          const snapshot = await get(child(dbRef, `users/${user.uid}`));
          if (snapshot.exists()) {
            window.location.href = "home.html";
          } else {
            await auth.signOut();
            alert('⚠️ Usuario no registrado en la base de datos.');
          }
        } catch (error) {
          console.error('Error:', error);
        }
      }
    });

    // Elementos DOM
    const loginForm = document.getElementById('loginFormElement');
    const registerForm = document.getElementById('registerFormElement');
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    const loginContainer = document.getElementById('loginForm');
    const registerContainer = document.getElementById('registerForm');

    function setActiveTab(tab) {
      tabLogin.classList.remove('active');
      tabRegister.classList.remove('active');
      tab.classList.add('active');
      if (tab === tabLogin) {
        loginContainer.classList.remove('hidden');
        registerContainer.classList.add('hidden');
      } else {
        registerContainer.classList.remove('hidden');
        loginContainer.classList.add('hidden');
      }
    }

    tabLogin.addEventListener('click', () => setActiveTab(tabLogin));
    tabRegister.addEventListener('click', () => setActiveTab(tabRegister));

    // Registro
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = registerForm.querySelector('input[type="text"]').value.trim();
      const email = registerForm.querySelector('input[type="email"]').value.trim();
      const password = registerForm.querySelector('input[type="password"]').value;

      if (!name || !email || !password) {
        alert('⚠️ Completa todos los campos.');
        return;
      }
      if (password.length < 6) {
        alert('⚠️ La contraseña debe tener al menos 6 caracteres.');
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        await set(ref(database, `users/${user.uid}`), {
          uid: user.uid,
          name: name,
          email: user.email,
          createdAt: new Date().toISOString(),
          lastLogin: new Date().toISOString(),
          active: true
        });
        alert('✅ ¡Registro exitoso!');
        window.location.href = "home.html";
      } catch (error) {
        let mensaje = '❌ Error al registrar. ';
        if (error.code === 'auth/email-already-in-use') mensaje += 'Correo ya registrado.';
        else if (error.code === 'auth/invalid-email') mensaje += 'Correo inválido.';
        else if (error.code === 'auth/weak-password') mensaje += 'Contraseña débil.';
        else mensaje += error.message;
        alert(mensaje);
      }
    });

    // Inicio de sesión
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = loginForm.querySelector('input[type="email"]').value.trim();
      const password = loginForm.querySelector('input[type="password"]').value;

      if (!email || !password) {
        alert('⚠️ Completa todos los campos.');
        return;
      }

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const dbRef = ref(database);
        const snapshot = await get(child(dbRef, `users/${user.uid}`));
        
        if (snapshot.exists()) {
          await update(ref(database, `users/${user.uid}`), {
            lastLogin: new Date().toISOString()
          });
          alert('✅ ¡Bienvenido!');
          window.location.href = "home.html";
        } else {
          await auth.signOut();
          alert('❌ Usuario no encontrado en la base de datos.');
        }
      } catch (error) {
        let mensaje = '❌ Error al iniciar sesión. ';
        if (error.code === 'auth/user-not-found') mensaje += 'Usuario no encontrado.';
        else if (error.code === 'auth/wrong-password') mensaje += 'Contraseña incorrecta.';
        else if (error.code === 'auth/invalid-email') mensaje += 'Correo inválido.';
        else mensaje += error.message;
        alert(mensaje);
      }
    });

    window.cambiarATab = (tab) => {
      if (tab === 'login') setActiveTab(tabLogin);
      else setActiveTab(tabRegister);
    };
  </script>

  <style>
    /* ===== RESET Y BASE ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Exo 2', 'Orbitron', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      color: #f0f4ff;
      position: relative;
      overflow-x: hidden;
      background: #03050b;
    }

    /* ===== FONDO CON IMAGEN YESLY ===== */
    .bg-image-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://raw.githubusercontent.com/welding30001994/yeslyface/main/yesly.png?raw=true');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      opacity: 0.35;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== OVERLAY NEÓN + GRID ===== */
    .cyber-grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        repeating-linear-gradient(0deg, rgba(0, 255, 255, 0.05) 0px, rgba(0, 255, 255, 0.05) 1px, transparent 1px, transparent 45px),
        repeating-linear-gradient(90deg, rgba(0, 255, 255, 0.05) 0px, rgba(0, 255, 255, 0.05) 1px, transparent 1px, transparent 45px);
      z-index: 1;
      pointer-events: none;
    }

    .glow-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.08), rgba(0, 0, 0, 0.80));
      z-index: 2;
      pointer-events: none;
    }

    /* ===== PARTICULAS ===== */
    #particles-js {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== TARJETA GLASS ===== */
    .glass-card {
      position: relative;
      z-index: 15;
      background: rgba(8, 12, 30, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid rgba(0, 255, 255, 0.2);
      border-radius: 3.5rem;
      padding: 2.8rem 2.5rem;
      max-width: 480px;
      width: 100%;
      transition: all 0.4s ease;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 60px rgba(0, 255, 255, 0.05);
    }

    .glass-card:hover {
      border-color: rgba(0, 255, 255, 0.4);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.7), 0 0 80px rgba(0, 255, 255, 0.08);
    }

    /* ===== BRAND ===== */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 2.8rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #00ffff, #ff44e6, #00ffff);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientMove 4s ease-in-out infinite alternate;
      text-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .brand h1 i {
      font-size: 2.2rem;
      color: #00ffff;
      -webkit-text-fill-color: initial;
      filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.5));
    }

    .brand .sub {
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 0.2rem;
      border-top: 1px solid rgba(0, 255, 255, 0.1);
      padding-top: 0.6rem;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
    }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.4rem;
      border-radius: 60px;
      margin-bottom: 2rem;
      border: 1px solid rgba(0, 255, 255, 0.08);
      backdrop-filter: blur(5px);
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.8rem 0.2rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Exo 2', sans-serif;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.5px;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(255, 68, 230, 0.15));
      color: white;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.2);
    }

    .tab-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.03);
    }

    /* ===== FORMULARIOS ===== */
    .form-group {
      margin-bottom: 1.6rem;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 40px;
      border: 1.5px solid rgba(0, 255, 255, 0.1);
      padding: 0.1rem 1.2rem;
      transition: all 0.4s ease;
      backdrop-filter: blur(5px);
    }

    .input-wrapper:focus-within {
      border-color: rgba(0, 255, 255, 0.4);
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.05), inset 0 0 20px rgba(0, 255, 255, 0.03);
      transform: scale(1.01);
    }

    .input-wrapper i {
      color: rgba(255, 255, 255, 0.3);
      font-size: 1rem;
      margin-right: 0.8rem;
      opacity: 0.6;
      transition: 0.3s;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .input-wrapper:focus-within i {
      opacity: 1;
      color: #00ffff;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    .input-wrapper input {
      width: 100%;
      background: transparent;
      border: none;
      padding: 0.9rem 0;
      font-size: 1rem;
      color: white;
      outline: none;
      font-family: 'Exo 2', sans-serif;
      font-weight: 400;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .input-wrapper input::placeholder {
      color: rgba(255, 255, 255, 0.25);
      font-weight: 300;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .input-wrapper input:focus::placeholder {
      opacity: 0;
    }

    .input-wrapper input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.4) inset !important;
      -webkit-text-fill-color: white !important;
    }

    /* ===== BOTÓN PRINCIPAL ===== */
    .btn-primary {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 60px;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.4), rgba(255, 68, 230, 0.4));
      backdrop-filter: blur(10px);
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 40px rgba(0, 255, 255, 0.1);
      margin-top: 0.4rem;
      font-family: 'Orbitron', sans-serif;
      border: 1px solid rgba(0, 255, 255, 0.2);
      text-transform: uppercase;
    }

    .btn-primary:hover {
      transform: scale(1.02);
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.6), rgba(255, 68, 230, 0.6));
      box-shadow: 0 12px 50px rgba(0, 255, 255, 0.2);
      border-color: rgba(0, 255, 255, 0.4);
    }

    .btn-primary:active {
      transform: scale(0.97);
    }

    .btn-primary i {
      margin-right: 0.5rem;
    }

    /* ===== FOOTER FORM ===== */
    .form-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.4);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .form-footer a {
      color: rgba(0, 255, 255, 0.6);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px dashed rgba(0, 255, 255, 0.2);
      cursor: pointer;
      transition: 0.3s;
    }

    .form-footer a:hover {
      color: #00ffff;
      border-bottom-color: rgba(0, 255, 255, 0.5);
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
    }

    .form-container {
      display: block;
      transition: opacity 0.25s;
    }

    .form-container.hidden {
      display: none;
    }

    /* ===== DIVIDER ===== */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0 1.5rem;
      color: rgba(255, 255, 255, 0.15);
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
    }

    /* ===== SOCIAL LINKS ===== */
    .social-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .social-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(5px);
      border: 1.5px solid rgba(0, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.3rem;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .social-link:hover {
      background: rgba(0, 255, 255, 0.1);
      border-color: rgba(0, 255, 255, 0.3);
      color: #00ffff;
      transform: translateY(-5px) scale(1.08);
      box-shadow: 0 10px 40px rgba(0, 255, 255, 0.1);
    }

    /* ===== DEMO NOTE ===== */
    .demo-note {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 1.8rem;
      opacity: 0.3;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.4);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .glass-card {
        padding: 1.8rem 1.2rem;
        border-radius: 2.5rem;
      }
      .brand h1 {
        font-size: 2rem;
      }
      .brand h1 i {
        font-size: 1.6rem;
      }
      .brand .sub {
        font-size: 0.7rem;
        letter-spacing: 4px;
      }
      .social-link {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }
      .tab-btn {
        font-size: 0.8rem;
        padding: 0.6rem 0.2rem;
      }
      .btn-primary {
        font-size: 0.9rem;
        padding: 0.8rem;
      }
    }
  </style>
</head>
<body>

    <!-- Social Links -->
    <div class="divider">CONÉCTATE</div>

      <a href="https://www.mql5.com/en/channels/yesly_adelay_trading_2026" target="_blank" class="social-link"><i class="fas fa-chart-line"></i></a>
    </div>

    <div class="demo-note">
      <i class="fas fa-image"></i> Yesly Adelay · Trading Cuántico
    </div>
  </div>

  <!-- ===== PARTICULAS ===== -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js">
  </script>
  <script>
    particlesJS('particles-js', {
      particles: {
        number: { value: 60, density: { enable: true, value_area: 800 } },
        color: { value: "#00ffff" },
        shape: { type: "circle" },
        opacity: { value: 0.3, random: true },
        size: { value: 2, random: true },
        line_linked: { enable: true, distance: 150, color: "#00ffff", opacity: 0.15, width: 1 },
        move: { enable: true, speed: 0.8, direction: "none", random: true, out_mode: "out" }
      },
      interactivity: {
        events: { onhover: { enable: true, mode: "repulse" }, onclick: { enable: true, mode: "push" } }
      },
      retina_detect: true
    });
  </script>
</body>
